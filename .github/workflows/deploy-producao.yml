name: Deploy Produção Nic-Labs

on:
  push:
    branches:
      - main # Dispara sempre que houver um push ou merge na main

jobs:
  deploy:
    runs-on: self-hosted # Força a execução no servidor da Nic-Labs

    steps:
      - name: Atualizar o código-fonte (Git Pull)
        run: |
          cd /opt/nic-labs/core/sistema-de-gestao
          git reset --hard
          git pull origin main

      - name: Reconstruir e reiniciar contêineres (Docker Compose)
        run: |
          cd /opt/nic-labs/core
          # Reconstrói apenas as imagens do sistema de gestão, sem afetar o resto da infra
          docker compose build gestao_backend gestao_frontend
          docker compose up -d gestao_backend gestao_frontend
          
          # Limpa as imagens antigas para não lotar o disco do servidor
          docker image prune -f
