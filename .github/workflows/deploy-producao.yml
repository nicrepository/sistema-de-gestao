name: Deploy Produção Nic-Labs

on:
  push:
    branches:
      - main # Dispara sempre que houver um push ou merge na main

jobs:
  deploy:
    runs-on: self-hosted # Força a execução no servidor da Nic-Labs

    steps:
      - name: Tratar permissões (Git Safe Directory)
        run: |
          git config --global --add safe.directory /opt/nic-labs/core/sistema-de-gestao

      - name: Atualizar o código-fonte (Git Pull)
        run: |
          cd /opt/nic-labs/core/sistema-de-gestao
          git fetch --all
          git reset --hard origin/main

      - name: Reconstruir e reiniciar contêineres (Docker Compose)
        run: |
          cd /opt/nic-labs/core
          # Removemos o sudo pois ele requer senha em ambiente não-interativo.
          # Usamos --env-file /dev/null para evitar o erro de 'permission denied' ao tentar ler o .env do root.
          # Os containers usam suas próprias variáveis internas ou do repositório.
          docker compose --env-file /dev/null build gestao_backend gestao_frontend
          docker compose --env-file /dev/null up -d gestao_backend gestao_frontend
          
          # Limpeza do disco (sem sudo)
          docker image prune -f
